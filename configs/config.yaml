path: data/SpeechCommands/speech_commands_v0.02
subset:  
  - "eight"
  - "five"
  - "four"
  - "marvin"
  - "nine"
  - "one"
  - "seven"
  - "six"
  - "three"
  - "two"
  - "zero"


sample_rate: 16000
clip_length: 1.0
n_fft: 400 # 25ms
hop_len: 160
n_mels: 64

learning_rate: 0.003
batch_size: 64
num_workers: 8
persistent_workers: true
prefetch_factor: 2
pin_memory: false
device: "auto"
max_steps: 10000
amp: true
log_period: 200
eval_period: 2000

seed: 42
base_path: "runs"
resume: null # set to str if you are resuming
remote_name: "training-s3-bucket-runpod/test"
cloud_sync: false

warmup_steps: 1000


silence_pool_size: 1000

keyword_weight: 0.7
unknown_weight: 0.2
silence_weight: 0.1

