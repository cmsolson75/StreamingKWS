data:
  path: data/SpeechCommands/speech_commands_v0.02
  subset:  
    - "eight"
    - "five"
    - "four"
    - "marvin"
    - "nine"
    - "one"
    - "seven"
    - "six"
    - "three"
    - "two"
    - "zero"
    - "stop"

preprocess:
  sample_rate: 16000
  clip_length: 1.0
  n_fft: 400 # 25ms
  hop_len: 160
  n_mels: 64

train:
  learning_rate: 0.001
  batch_size: 64
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: false # auto will turn this on with CUDA
  device: "auto"
  max_steps: 10000
  amp: true
  log_period: 200
  eval_period: 2000
  clip_norm: 10.0 # Essentially off
  warmup_steps: 1000
  dropout: 0.5

model:
  name: tc_resnet8


augment:
  use_augmentations: true
  noise_path: data/SpeechCommands/speech_commands_v0.02/_background_noise_
  prob_noise_mix_in: 0.75
  min_snr_db: -5.0
  max_snr_db: 25.0
  prob_gain_aug: 0.75
  min_db_gain: -15.0
  max_db_gain: 5.0
  freq_mask_param: 0 # OFF
  time_mask_param: 0 # OFF

env:
  seed: 42
  resume: null # set to str if you are resuming
  remote_name: "training-s3-bucket-runpod/test"
  cloud_sync: false

sampler:
  keyword_weight: 0.7
  oov_weight: 0.2
  silence_weight: 0.05
  background_weight: 0.05